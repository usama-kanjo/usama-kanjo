name: Update GitHub Activity

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACTIVITY_TOKEN }}
      
      - uses: jamesgeorge007/github-activity-readme@v0.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIVITY_TOKEN }}
        with:
          COMMIT_MSG: '⚡ Update recent activity'
          MAX_LINES: 10
